"Prone to clogs",category:"printer",quickStartSteps:["Check filament type matches machine — PLA 200°C, PETG 240°C, CoPE on designated machine only","Clean build plate with IPA","Ensure brim is active in slicer settings (mandatory)","Load filament and confirm it extrudes cleanly","Stay for first layer to confirm adhesion"],correctSettings:[{material:"PLA",nozzle:"200°C",bed:"60°C"},{material:"PETG",nozzle:"240°C",bed:"70°C"},{material:"CoPE",nozzle:"220°C",bed:"80°C",notes:"Designated machine only"}],troubleshooting:[{title:"Nozzle Clog",steps:["Pause the print immediately and unload filament","Heat the nozzle to printing temperature (200°C for PLA, 240°C for PETG)","Perform a cold pull: heat to 200°C, insert filament, cool to 90°C, then pull firmly","If cold pull fails, use the unclogging pin tool to push through the nozzle from above","If still clogged, proceed to the full print head disassembly repair guide","After clearing, extrude filament to confirm clean flow before resuming print"]},{title:"Filament Loading Failure",steps:["Check PTFE tube is fully seated in the coupler — push until it clicks","Look for broken filament pieces inside the PTFE tube path","If filament is stuck in the extruder, cut above the gear, remove the segment, and reload","Ensure the filament spool is not tangled and feeds freely","Try loading with the PTFE tube disconnected from the hot end to isolate the issue"]},{title:"First Layer Not Adhering",steps:["Clean the build plate thoroughly with IPA (isopropyl alcohol)","Re-level the bed using the built-in leveling routine","Check Z-offset — the nozzle should be about 0.1-0.2mm from the bed (paper test)","Verify brim is active in slicer settings (mandatory for all prints)","Ensure the build plate is not warped — check with a straight edge","Try increasing bed temperature by 5°C if adhesion is still poor"]},{title:"Filament Grinding / Extruder Clicking",steps:["Pause the print immediately to prevent further damage","Unload the filament and inspect the feeder gear for debris","Clean the feeder gear with a small brush or compressed air","Check the Bowden tube for wear or deformation — replace if damaged","Reduce print speed slightly and check if extrusion improves","If the filament is ground flat, cut back past the damaged section before reloading"]},{title:"Print Shifting / Layer Misalignment",steps:["Check all belt tensions — belts should be taut but not overly tight","Lubricate the linear rails with light machine oil or PTFE lubricant","Reduce travel speed in slicer settings (try 150mm/s instead of 200mm/s)","Ensure the build plate is not slipping — check the magnetic adhesion","Verify the printer is on a stable surface without vibration"]}],repairGuides:[{title:"Print Head Disassembly (Clog Clearing)",difficulty:"Medium",tools:["2mm Allen key","Unclogging pin tool","Needle-nose pliers","Isopropyl alcohol","Heat-resistant gloves"],warning:"Ensure printer is powered off and nozzle is cool before starting disassembly. Allow hot end to fully cool to avoid burns.",steps:["Power off the printer and disconnect the power cable. Wait for the hot end to cool completely to room temperature.","Remove the two M3 screws securing the print head cover using the 2mm Allen key. Set the cover aside carefully.","Disconnect the fan cable and thermistor cable from the print head PCB. Note the connector orientation for reassembly.","Loosen the setscrew on the heat break and carefully slide the hot end assembly downward out of the heat sink. Support it from below.","Use the unclogging pin tool to push any remaining filament through the heat break from the top. If severely clogged, heat the nozzle to 200°C briefly, then push filament through.","Inspect the PTFE tube inside the heat sink for damage or melting. If damaged, remove the collet clip and pull the PTFE tube out for replacement."]},{title:"Print Head Assembly (After Clog Clearing)",difficulty:"Medium",tools:["2mm Allen key","New PTFE tube (if needed)","Wire cutters (t ild plate with IPA","Ensure brim is active in slicer settings (mandatory)","Load filament and confirm it extrudes cleanly","Stay for first layer to confirm adhesion"],correctSettings:[{material:"PLA",nozzle:"200°C",bed:"60°C"},{material:"PETG",nozzle:"240°C",bed:"70°C"},{material:"CoPE",nozzle:"220°C",bed:"80°C",notes:"Designated machine only"}],troubleshooting:[{title:"Nozzle Clog",steps:["Pause the print immediately and unload filament","Heat the nozzle to printing temperature (200°C for PLA, 240°C for PETG)","Perform a cold pull: heat to 200°C, insert filament, cool to 90°C, then pull firmly","If cold pull fails, use the unclogging pin tool to push through the nozzle from above","If still clogged, proceed to the full print head disassembly repair guide","After clearing, extrude filament to confirm clean flow before resuming print"]},{title:"Filament Loading Failure",steps:["Check PTFE tube is fully seated in the coupler — push until it clicks","Look for broken filament pieces inside the PTFE tube path","If filament is stuck in the extruder, cut above the gear, remove the segment, and reload","Ensure the filament spool is not tangled and feeds freely","Try loading with the PTFE tube disconnected from the hot end to isolate the issue"]},{title:"First Layer Not Adhering",steps:["Clean the build plate thoroughly with IPA (isopropyl alcohol)","Re-level the bed using the built-in leveling routine","Check Z-offset — the nozzle should be about 0.1-0.2mm from the bed (paper test)","Verify brim is active in slicer settings (mandatory for all prints)","Ensure the build plate is not warped — check with a straight edge","Try increasing bed temperature by 5°C if adhesion is still poor"]},{title:"Filament Grinding / Extruder Clicking",steps:["Pause the print immediately to prevent further damage","Unload the filament and inspect the feeder gear for debris","Clean the feeder gear with a small brush or compressed air","Check the Bowden tube for wear or deformation — replace if damaged","Reduce print speed slightly and check if extrusion improves","If the filament is ground flat, cut back past the damaged section before reloading"]},{title:"Print Shifting / Layer Misalignment",steps:["Check all belt tensions — belts should be taut but not overly tight","Lubricate the linear rails with light machine oil or PTFE lubricant","Reduce travel speed in slicer settings (try 150mm/s instead of 200mm/s)","Ensure the build plate is not slipping — check the magnetic adhesion","Verify the printer is on a stable surface without vibration"]}],repairGuides:[{title:"Print Head Disassembly (Clog Clearing)",difficulty:"Medium",tools:["2mm Allen key","Unclogging pin tool","Needle-nose pliers","Isopropyl alcohol","Heat-resistant gloves"],warning:"Ensure printer is powered off and nozzle is cool before starting disassembly. Allow hot end to fully cool to avoid burns.",steps:["Power off the printer and disconnect the power cable. Wait for the hot end to cool completely to room temperature.","Remove the two M3 screws securing the print head cover using the 2mm Allen key. Set the cover aside carefully.","Disconnect the fan cable and thermistor cable from the print head PCB. Note the connector orientation for reassembly.","Loosen the setscrew on the heat break and carefully slide the hot end assembly downward out of the heat sink. Support it from below.","Use the unclogging pin tool to push any remaining filament through the heat break from the top. If severely clogged, heat the nozzle to 200°C briefly, then push filament through.","Inspect the PTFE tube inside the heat sink for damage or melting. If damaged, remove the collet clip and pull the PTFE tube out for replacement."]},{title:"Print Head Assembly (After Clog Clearing)",difficulty:"Medium",tools:["2mm Allen key","New PTFE tube (if needed)","Wire cutters (to trim PTFE)","Isopropyl alcohol","Thermal paste (optional)"],warning:"Do not overtighten screws. Ensure all cables are properly connected before powering on ty:"Medium",tools:["2mm Allen key","1.5mm Allen key","New hot end assembly","Isopropyl alcohol"],warning:"Allow hot end to cool completely before replacement. The P1S uses a quick-change hot end — no heating required for removal.",steps:["Pause any running print and home the printer","Open the door and locate the hot end on the tool head","Press the hot end release lever on the side of the tool head","Pull the hot end straight down and out of the tool head","Align the new hot end with the tool head slot and push up until it clicks","The printer will automatically detect the new hot end and read its RFID tag","Run a calibration from the printer screen before printing"]},{title:"Extruder Cleaning",difficulty:"Easy",tools:["2mm Allen key","Brass brush","Isopropyl alcohol","Unclogging pin"],steps:["Unload filament from the extruder via the printer menu","Open the extruder cover by removing the two screws on the side","Use the brass brush to clean the feeder gear teeth — remove all filament debris","Check for ground filament packed between the gear teeth","Wipe the inside with IPA on a lint-free cloth","Reassemble the extruder cover and test by loading filament"]},{title:"AMS Maintenance",difficulty:"Medium",tools:["Lint-free cloth","Isopropyl alcohol","Small Phillips screwdriver","PTFE tube cutter"],steps:["Power off the printer before cleaning the AMS","Remove all filament spools from the AMS","Wipe down the rubber rollers with IPA — they collect filament dust over time","Check each PTFE tube for wear or kinks, replace any damaged sections","Vacuum or blow out filament debris from the spool bays","Check the AMS belt tension — it should move smoothly without slack","Reinstall spools and run the AMS self-test from Bambu Handy app"]},{title:"Carbon Rod Cleaning",difficulty:"Easy",tools:["Isopropyl alcohol","Lint-free cloth","PTFE lubricant (optional)"],steps:["Power off the printer and move the tool head to the center manually","Wipe the carbon rods with IPA on a lint-free cloth","Check for any sticky residue or buildup on the rods","If the tool head feels gritty when moving, clean more thoroughly","Apply a very small amount of PTFE lubricant to each rod if movement is not smooth","Move the tool head back and forth several times to distribute the lubricant"]}],rules:["Brim must always be active","Check filament type before printing","Check filament amount is sufficient","Check bed is clean","Check nozzle is clean","Stay for first layer","Remove print promptly when done","Report failures immediately","Use Bambu Handy app to monitor prints remotely"],videoUrls:["https://www.youtube.com/watch?v=vdG84yOj-Qc"]},{id:"p1s-middle",name:"Middle P1S",icon:"🖨️",status:"operational",quantity:"1 unit",category:"printer",quickStartSteps:["Select correct filament profile in Bambu Studio — don't guess","Check filament type and amount","Clean build plate","Ensure brim is active (mandatory)","Monitor first layer via camera or in person"],correctSettings:[{material:"PLA",nozzle:"200°C",bed:"60°C"},{material:"PETG",nozzle:"240°C",bed:"70°C"},{material:"TPU",nozzle:"220°C",bed:"50°C"},{material:"PC",nozzle:"260°C",bed:"100°C"},{material:"PA (Nylon)",nozzle:"260°C",bed:"80°C"}],troubleshooting:[{title:"Print Failure (Wrong Settings)",steps:["Verify the material profile in Bambu Studio matches the loaded filament exactly","Check that brim is enabled in the slicer — this is mandatory for all prints","Confirm the correct printer is selected in Bambu Studio (P1S, not X1C or A1)","Compare your settings against the Correct Settings table on this page"]},{title:"Bed Adhesion Issues",steps:["Clean the build plate with IPA — oils from hands reduce adhesion significantly","Check bed temperature matches the material profile","Use a glue stick on the textured PEI plate for materials like PETG and PC","Ensure the first layer height is not too high — Z-offset should be properly calibrated","Try increasing bed temperature by 5°C"]},{title:"Filament Runout During Print" y","Lubricate the Z-rod with PTFE or light machine oil","Check the Z-nut for excessive play — a loose Z-nut causes banding","Ensure the printer frame is square and sitting on a level surface"]},{title:"Over-Extrusion",steps:["Calibrate E-steps (see repair guide for procedure)","Reduce flow rate in slicer by 5-10% as a temporary fix","Check filament diameter setting matches actual filament (measure with calipers)","Ensure you are not using a different filament profile than what is loaded"]}],repairGuides:[{title:"Belt Tensioning",difficulty:"Easy",tools:["2mm Allen key","Belt tension gauge (or phone app)"],steps:["Home the printer to move the gantry to a known position","Locate the belt tensioner on each axis — it is a screw-adjustable mechanism","Pluck the belt like a guitar string — it should produce a clear tone, not a dull thud","Tighten the tensioner screw to increase tension, loosen to decrease","The belt should deflect about 5-10mm when pressed with moderate finger pressure","Check both X and Y belts — they should have similar tension","Re-home the printer and run a test print to verify improvement"]},{title:"Z-Rod Alignment",difficulty:"Medium",tools:["2mm Allen key","Square or straight edge","PTFE lubricant"],steps:["Power off the printer and manually move the print head to the top of the Z axis","Place a square against the frame and check if the Z-rod is perfectly vertical","If misaligned, loosen the Z-motor mounting screws slightly","Gently reposition the Z-motor until the rod is vertical, then re-tighten","Loosen the Z-nut bracket screws and let the rod self-align, then re-tighten","Lubricate the Z-rod with PTFE lubricant","Move the print head up and down manually to verify smooth travel"]},{title:"E-Step Calibration",difficulty:"Medium",tools:["Ruler or calipers","Marker pen","Computer with terminal access (e.g., Pronterface)"],steps:["Mark the filament at the entry point to the extruder with a marker (120mm from the extruder body)","Measure the exact distance and note it (e.g., 120mm)","Command the extruder to feed 100mm of filament (M92 or G1 E100 command)","Measure the remaining distance from the extruder body to the mark","Calculate actual extruded length: (original distance) - (remaining distance)","Calculate new E-steps: (current E-steps × 100) / actual extruded length","Set the new E-steps with M92 E[new value] command and save with M500","Repeat the test to verify the new value is accurate"]},{title:"Gantry Tramming",difficulty:"Hard",tools:["2mm Allen key","3mm Allen key","Dial indicator or piece of paper","Square"],warning:"This is an advanced procedure. If unsure, contact Exco or Snapmaker support. Incorrect tramming can damage the printer.",steps:["Home the printer and disable steppers (M84 command)","Manually move the print head to each corner of the build plate","Check the distance between the nozzle and build plate at each corner using a piece of paper","All four corners should have the same paper drag resistance","Adjust the Z-endstop or bed leveling screws to even out any differences","For the X-axis gantry: check that both sides are at the same height","If one side is higher, loosen the set screws on the Z-axis coupler on the higher side","Lower that side until both sides are level, then re-tighten","Re-home and verify all four corners have equal nozzle height","Run a first-layer test print and inspect for consistent adhesion across the bed"]}],rules:["Brim must always be active","Check filament type before printing","Check filament amount is sufficient","Check bed is clean","Check nozzle is clean","Stay for first layer","Remove print promptly when done","Report failures immediately","PLA only until calibration is complete","Report all quality issues to Exco"],videoUrls:["https://www.youtube.com/watch?v=b19pqEl3FCo"]},{id:"snapmaker-artisan",name:"Snapmaker Artisan (40W Laser + CNC)",icon:"⚡",status:"operational",quantity:"1 unit",category:"snapmaker",laserQuickStart:["Check material is approved f h",steps:["Increase power percentage or reduce speed","Check that the laser lens is clean — a dirty lens scatters the beam","Ensure the material is flat and at the correct focal distance","For thick materials, try multiple passes instead of one slow pass","Check that the laser module fan is running — overheating reduces power"]},{title:"Burn Marks on Material",steps:["Reduce laser power slightly","Increase cutting speed","Apply masking tape over the cut line — peel off after cutting","Use the air assist feature if available to blow away smoke at the cut point","For acrylic, the protective film should be left on during cutting"]},{title:"CNC Bit Breaking",steps:["Reduce depth per pass — the most common cause of bit breakage","Check the feed rate is not too high for the material","Ensure the bit is properly colleted and not sticking out too far","For aluminum, use cutting fluid and very light passes","Check that the material is securely clamped — vibration causes bit breakage"]},{title:"Material Not Secure",steps:["Use proper clamps — do not rely on tape or friction alone","Check the CNC wasteboard is clean and flat","For laser work, use the included hold-down pins or magnets","Ensure the work area is level — warped materials shift during cutting"]},{title:"Laser Not Firing",steps:["Check the door safety interlock — the laser will not fire if the enclosure door is open","Verify the laser module is properly seated in the quick-change mount","Check the module connection cable is fully inserted","Restart the machine and try again — sometimes a firmware glitch prevents firing","If the laser still does not fire, the module may need replacement — contact Exco"]}],repairGuides:[{title:"Laser Lens Cleaning",difficulty:"Easy",tools:["Lens cleaning tissue","Isopropyl alcohol (90%+)","Cotton swabs","Compressed air"],steps:["Power off the machine and remove the laser module","Use compressed air to blow away loose dust and debris from the lens area","Apply a small amount of IPA to
